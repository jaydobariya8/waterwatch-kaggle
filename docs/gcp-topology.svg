<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 520" font-family="Inter, system-ui, sans-serif">
  <rect width="980" height="520" rx="18" fill="#06222c"/>
  <text x="40" y="48" fill="#36e0c4" font-size="13" letter-spacing="3" font-weight="600">FIGURE 2 — GCP DEPLOYMENT TOPOLOGY</text>
  <text x="40" y="74" fill="#93b6bd" font-size="13">One Cloud Run service hosts the FastAPI app + agents + MCP. Firestore holds state, Storage holds reports,</text>
  <text x="40" y="92" fill="#93b6bd" font-size="13">Secret Manager holds keys, Scheduler drives the watchdog, and Logging/Trace provide observability.</text>

  <rect x="40" y="120" width="900" height="360" rx="14" fill="none" stroke="#1f8a9c" stroke-dasharray="5 4"/>
  <text x="60" y="146" fill="#5d9aa6" font-size="12" font-weight="600">Google Cloud Project</text>

  <!-- citizen -->
  <rect x="60" y="250" width="140" height="48" rx="10" fill="#0e3b4b" stroke="#1f8a9c"/>
  <text x="130" y="272" fill="#eaf6f5" font-size="13" font-weight="600" text-anchor="middle">Citizen</text>
  <text x="130" y="288" fill="#93b6bd" font-size="10.5" text-anchor="middle">browser (HTTPS)</text>

  <!-- cloud run -->
  <rect x="360" y="232" width="240" height="84" rx="12" fill="#114454" stroke="#36e0c4"/>
  <text x="480" y="262" fill="#eaf6f5" font-size="15" font-weight="700" text-anchor="middle">Cloud Run</text>
  <text x="480" y="282" fill="#cfe7e6" font-size="11" text-anchor="middle">WaterWatch service</text>
  <text x="480" y="298" fill="#93b6bd" font-size="10.5" text-anchor="middle">FastAPI + agents + MCP</text>
  <path d="M200 274 H 360" fill="none" stroke="#36e0c4" stroke-width="1.6"/>
  <polygon points="360,274 351,270 351,278" fill="#36e0c4"/>

  <!-- secret manager -->
  <rect x="360" y="150" width="240" height="44" rx="10" fill="#1a2f22" stroke="#f4b740"/>
  <text x="480" y="170" fill="#f4b740" font-size="12.5" font-weight="600" text-anchor="middle">Secret Manager</text>
  <text x="480" y="186" fill="#d9c89a" font-size="10.5" text-anchor="middle">API keys (never in code)</text>
  <line x1="480" y1="194" x2="480" y2="232" stroke="#f4b740" stroke-width="1.4" stroke-dasharray="4 3"/>

  <!-- vertex -->
  <rect x="700" y="150" width="220" height="44" rx="10" fill="#0e3b4b" stroke="#36e0c4"/>
  <text x="810" y="170" fill="#36e0c4" font-size="12.5" font-weight="600" text-anchor="middle">Vertex AI</text>
  <text x="810" y="186" fill="#93b6bd" font-size="10.5" text-anchor="middle">Gemini (Pro + Flash)</text>
  <path d="M600 258 H 810 V 194" fill="none" stroke="#36e0c4" stroke-width="1.4"/>
  <polygon points="810,194 806,203 814,203" fill="#36e0c4"/>

  <!-- logging -->
  <rect x="700" y="232" width="220" height="44" rx="10" fill="#0e3b4b" stroke="#1f8a9c"/>
  <text x="810" y="252" fill="#cfe7e6" font-size="12.5" text-anchor="middle">Logging + Trace</text>
  <text x="810" y="268" fill="#93b6bd" font-size="10.5" text-anchor="middle">observability (Day 4)</text>
  <line x1="600" y1="270" x2="700" y2="254" stroke="#1f8a9c" stroke-width="1.2" stroke-dasharray="4 3"/>

  <!-- storage -->
  <rect x="250" y="340" width="150" height="44" rx="10" fill="#0e3b4b" stroke="#1f8a9c"/>
  <text x="325" y="360" fill="#cfe7e6" font-size="12" text-anchor="middle">Storage</text>
  <text x="325" y="376" fill="#93b6bd" font-size="10" text-anchor="middle">reports · auto-expire</text>
  <line x1="430" y1="316" x2="350" y2="340" stroke="#1f8a9c" stroke-width="1.2"/>

  <!-- firestore -->
  <rect x="420" y="340" width="160" height="44" rx="10" fill="#0e3b4b" stroke="#1f8a9c"/>
  <text x="500" y="360" fill="#cfe7e6" font-size="12" text-anchor="middle">Firestore</text>
  <text x="500" y="376" fill="#93b6bd" font-size="10" text-anchor="middle">complaints · pincode index</text>
  <line x1="490" y1="316" x2="500" y2="340" stroke="#1f8a9c" stroke-width="1.2"/>

  <!-- scheduler -->
  <rect x="700" y="340" width="220" height="44" rx="10" fill="#1a2f22" stroke="#f4b740"/>
  <text x="810" y="360" fill="#f4b740" font-size="12.5" font-weight="600" text-anchor="middle">Cloud Scheduler</text>
  <text x="810" y="376" fill="#d9c89a" font-size="10.5" text-anchor="middle">daily /watchdog/run trigger</text>
  <path d="M810 340 V 300 H 600" fill="none" stroke="#f4b740" stroke-width="1.4" stroke-dasharray="4 3"/>
  <polygon points="600,300 609,296 609,304" fill="#f4b740"/>

  <!-- external -->
  <rect x="250" y="412" width="330" height="44" rx="10" fill="#13402c" stroke="#35d39a"/>
  <text x="415" y="432" fill="#9ef0c8" font-size="12.5" font-weight="600" text-anchor="middle">data.gov.in / CPCB</text>
  <text x="415" y="448" fill="#7fcfae" font-size="10.5" text-anchor="middle">external civic API (egress) — bundled snapshot fallback</text>
  <line x1="480" y1="316" x2="430" y2="412" stroke="#35d39a" stroke-width="1.2" stroke-dasharray="4 3"/>

  <text x="60" y="470" fill="#5d7f86" font-size="10.5">Gold = secrets &amp; scheduling · Green = external/civic · dashed = control / observability plane</text>
</svg>
