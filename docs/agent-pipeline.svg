<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 620" font-family="Inter, system-ui, sans-serif">
  <rect width="980" height="620" rx="18" fill="#06222c"/>
  <text x="40" y="48" fill="#36e0c4" font-size="13" letter-spacing="3" font-weight="600">FIGURE 1 — WATERWATCH AGENT PIPELINE</text>
  <text x="40" y="74" fill="#93b6bd" font-size="13">Orchestrator runs Parser → Standards → Health as a sequence; the Verifier loops until every claim is cited;</text>
  <text x="40" y="92" fill="#93b6bd" font-size="13">Action drafts behind a human gate; the Watchdog persists state and escalates, talking to Civic Aggregation over A2A.</text>

  <!-- citizen -->
  <rect x="380" y="120" width="220" height="46" rx="10" fill="#0e3b4b" stroke="#1f8a9c"/>
  <text x="490" y="142" fill="#eaf6f5" font-size="14" font-weight="600" text-anchor="middle">Citizen / RWA</text>
  <text x="490" y="158" fill="#93b6bd" font-size="11" text-anchor="middle">uploads lab report (PDF / photo)</text>

  <!-- orchestrator -->
  <rect x="300" y="196" width="380" height="48" rx="10" fill="#114454" stroke="#36e0c4"/>
  <text x="490" y="218" fill="#eaf6f5" font-size="14" font-weight="700" text-anchor="middle">Orchestrator (Root Agent)</text>
  <text x="490" y="234" fill="#93b6bd" font-size="11" text-anchor="middle">routes the job · holds session state · calls specialists as AgentTools</text>

  <line x1="490" y1="166" x2="490" y2="196" stroke="#1f8a9c" stroke-width="1.5"/>

  <!-- specialists row -->
  <g font-size="13" font-weight="600" text-anchor="middle">
    <rect x="40" y="290" width="150" height="70" rx="10" fill="#0e3b4b" stroke="#2a8fae"/>
    <text x="115" y="316" fill="#eaf6f5">1 · Parser</text>
    <text x="115" y="334" fill="#93b6bd" font-size="10.5" font-weight="400">vision → params</text>
    <text x="115" y="348" fill="#93b6bd" font-size="10.5" font-weight="400">+ confidence</text>

    <rect x="210" y="290" width="150" height="70" rx="10" fill="#0e3b4b" stroke="#2a8fae"/>
    <text x="285" y="316" fill="#eaf6f5">2 · Standards</text>
    <text x="285" y="334" fill="#93b6bd" font-size="10.5" font-weight="400">BIS 10500 +</text>
    <text x="285" y="348" fill="#93b6bd" font-size="10.5" font-weight="400">area breaches</text>

    <rect x="380" y="290" width="150" height="70" rx="10" fill="#0e3b4b" stroke="#2a8fae"/>
    <text x="455" y="316" fill="#eaf6f5">3 · Health</text>
    <text x="455" y="334" fill="#93b6bd" font-size="10.5" font-weight="400">impact per</text>
    <text x="455" y="348" fill="#93b6bd" font-size="10.5" font-weight="400">contaminant (cited)</text>

    <rect x="550" y="290" width="150" height="70" rx="10" fill="#1a2f22" stroke="#f4b740"/>
    <text x="625" y="316" fill="#f4b740">4 · Verifier</text>
    <text x="625" y="334" fill="#d9c89a" font-size="10.5" font-weight="400">LoopAgent — blocks</text>
    <text x="625" y="348" fill="#d9c89a" font-size="10.5" font-weight="400">uncited lines, re-loops</text>
  </g>

  <!-- loop arrow -->
  <path d="M625 290 C 625 268 540 268 540 290" fill="none" stroke="#f4b740" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="582" y="262" fill="#f4b740" font-size="10" text-anchor="middle">loop until clean</text>

  <line x1="490" y1="244" x2="490" y2="270" stroke="#1f8a9c" stroke-width="1.5"/>
  <line x1="115" y1="270" x2="625" y2="270" stroke="#1f8a9c" stroke-width="1.5"/>
  <line x1="115" y1="270" x2="115" y2="290" stroke="#1f8a9c" stroke-width="1.5"/>
  <line x1="285" y1="270" x2="285" y2="290" stroke="#1f8a9c" stroke-width="1.5"/>
  <line x1="455" y1="270" x2="455" y2="290" stroke="#1f8a9c" stroke-width="1.5"/>
  <line x1="625" y1="270" x2="625" y2="290" stroke="#f4b740" stroke-width="1.5"/>

  <!-- MCP server -->
  <rect x="210" y="392" width="320" height="46" rx="10" fill="#0a3140" stroke="#36e0c4"/>
  <text x="370" y="414" fill="#36e0c4" font-size="13" font-weight="700" text-anchor="middle">MCP Server (tools)</text>
  <text x="370" y="430" fill="#93b6bd" font-size="10.5" text-anchor="middle">get_bis_limit · evaluate_sample · get_area_readings · match_filtration · health_effect</text>
  <line x1="285" y1="360" x2="285" y2="392" stroke="#36e0c4" stroke-width="1.5"/>

  <!-- data stores -->
  <rect x="210" y="462" width="150" height="40" rx="8" fill="#0e3b4b" stroke="#1f8a9c"/>
  <text x="285" y="486" fill="#cfe7e6" font-size="11" text-anchor="middle">BIS 10500 (bundled)</text>
  <rect x="380" y="462" width="150" height="40" rx="8" fill="#0e3b4b" stroke="#1f8a9c"/>
  <text x="455" y="486" fill="#cfe7e6" font-size="11" text-anchor="middle">data.gov.in / CPCB</text>
  <line x1="285" y1="438" x2="285" y2="462" stroke="#1f8a9c" stroke-width="1.2"/>
  <line x1="455" y1="438" x2="455" y2="462" stroke="#1f8a9c" stroke-width="1.2"/>

  <!-- action + human gate -->
  <rect x="550" y="392" width="150" height="46" rx="10" fill="#0e3b4b" stroke="#2a8fae"/>
  <text x="625" y="414" fill="#eaf6f5" font-size="13" font-weight="600" text-anchor="middle">5 · Action</text>
  <text x="625" y="430" fill="#93b6bd" font-size="10.5" text-anchor="middle">complaint + filter match</text>
  <line x1="625" y1="360" x2="625" y2="392" stroke="#f4b740" stroke-width="1.5"/>

  <rect x="550" y="462" width="150" height="42" rx="10" fill="#13402c" stroke="#35d39a"/>
  <text x="625" y="483" fill="#9ef0c8" font-size="12" font-weight="600" text-anchor="middle">Human approval</text>
  <text x="625" y="498" fill="#7fcfae" font-size="10" text-anchor="middle">gate before anything sends</text>
  <line x1="625" y1="438" x2="625" y2="462" stroke="#35d39a" stroke-width="1.5"/>

  <!-- watchdog + civic -->
  <rect x="300" y="534" width="200" height="50" rx="10" fill="#114454" stroke="#36e0c4"/>
  <text x="400" y="556" fill="#eaf6f5" font-size="13" font-weight="700" text-anchor="middle">6 · Watchdog</text>
  <text x="400" y="572" fill="#93b6bd" font-size="10.5" text-anchor="middle">tracks · follows up · escalates (RTI)</text>
  <line x1="625" y1="504" x2="625" y2="559" stroke="#35d39a" stroke-width="1.2"/>
  <line x1="500" y1="559" x2="625" y2="559" stroke="#35d39a" stroke-width="1.2"/>

  <rect x="560" y="534" width="200" height="50" rx="10" fill="#13402c" stroke="#35d39a"/>
  <text x="660" y="556" fill="#9ef0c8" font-size="12.5" font-weight="600" text-anchor="middle">Civic Aggregation</text>
  <text x="660" y="572" fill="#7fcfae" font-size="10" text-anchor="middle">pincode contaminant clusters</text>
  <path d="M500 559 H 560" fill="none" stroke="#35d39a" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="530" y="552" fill="#35d39a" font-size="9.5" text-anchor="middle">A2A</text>

  <!-- firestore -->
  <rect x="80" y="534" width="160" height="50" rx="10" fill="#0e3b4b" stroke="#1f8a9c"/>
  <text x="160" y="556" fill="#cfe7e6" font-size="12" text-anchor="middle">Firestore</text>
  <text x="160" y="572" fill="#93b6bd" font-size="10" text-anchor="middle">state / memory</text>
  <line x1="300" y1="559" x2="240" y2="559" stroke="#1f8a9c" stroke-width="1.2"/>

  <text x="40" y="606" fill="#5d7f86" font-size="10.5">White = LLM specialist · Gold = self-verification · Green = human-gated / civic-scale · Teal = grounding tools</text>
</svg>
